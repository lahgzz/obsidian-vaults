name: Deploy Quartz site to GitHub Pages
 
on:
  push:
    branches:
      - main
    paths:
      - content/**
      - .quartz/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: "pages"
  cancel-in-progress: false
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for git info
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Cache Quartz plugins
        uses: actions/cache@v5
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('.quartz/quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-
      - name: Link Quartz config files
        run: |
          ln -sf .quartz/package.json package.json
          ln -sf .quartz/package-lock.json package-lock.json
          ln -sf .quartz/quartz.config.yaml quartz.config.yaml
          ln -sf .quartz/quartz.lock.json quartz.lock.json
          cp .quartz/quartz.ts quartz.ts
      - name: Clone Quartz engine
        run: |
          git clone --depth 1 --branch v5 https://github.com/jackyzha0/quartz.git _qtmp
          rm -rf quartz
          mv _qtmp/quartz quartz
          rm -rf _qtmp
      - name: Install Dependencies
        run: npm ci
      - name: Install Quartz plugins
        run: node ./quartz/bootstrap-cli.mjs plugin install
      - name: Build Quartz
        run: node ./quartz/bootstrap-cli.mjs build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
 
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4